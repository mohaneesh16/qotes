# Render Blueprint for the Qotes backend (Next.js API).
# Deploy: push this repo to GitHub, then in Render -> "New +" -> "Blueprint"
# and point it at this repo. Secret values are entered in the dashboard
# (sync: false means "ask me, don't read from this file").
services:
  - type: web
    name: qotes
    runtime: node
    plan: free            # change to "starter" ($7/mo) to avoid idle spin-down
    region: oregon        # or: frankfurt / singapore — pick what's closest
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/quotes
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      # --- Database (Turso) — copy from your current Vercel env ---
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      # --- Auth.js / Google OAuth ---
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false
      # Set this to your Render URL once known, e.g.
      # https://qotes.onrender.com  (or your custom domain)
      - key: AUTH_URL
        sync: false
